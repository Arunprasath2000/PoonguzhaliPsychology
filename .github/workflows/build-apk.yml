name: Build Android APK

# Builds an installable .apk in the cloud (no tools needed on your PC).
# Runs automatically on every push, and can be started manually from the
# "Actions" tab with the "Run workflow" button.
on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web app
        run: npm run build

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icon + splash
        run: |
          node scripts/gen-icons.mjs
          npx capacitor-assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: android

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PoonguzhaliPsychology-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
